<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mario Running</title>
        <link rel="stylesheet" href="src/css/style.css">
        <link rel = "shortcut icon" href ="src/img/icon-mario.ico">
    </head>

    <body id="telaInicial">
        <main>
            <article class="telaInicialNuvensTraseiras">
                <div>
                    <img class="nuvem n0" src="./src/img/pequena-nuvem.png" alt="Nuvem Pequena">
                    <img class="nuvem n1" src="./src/img/grande-nuvem.png" alt="Nuvem Grande">
                    <img class="nuvem n2" src="./src/img/grande-nuvem.png" alt="Nuvem Grande">
                    <img class="nuvem n4" src="./src/img/grande-nuvem.png" alt="Nuvem Grande">
                </div>
                
                <div>
                    <img class="nuvem n3" src="./src/img/pequena-nuvem.png" alt="Nuvem Pequena">
                    <img class="nuvem n0" src="./src/img/pequena-nuvem.png" alt="Nuvem Pequena">
                    <img class="nuvem n4" src="./src/img/grande-nuvem.png" alt="Nuvem Grande">
                    <img class="nuvem n1" src="./src/img/grande-nuvem.png" alt="Nuvem Grande">
                </div>
            </article>

            <div class="telaInicialLogo">
                <img src="./src/img/Logo.png" alt="">
            </div>

            <article class="telaInicialNuvensDianteiras">
                <div>
                    <img class="nuvem n6" src="./src/img/pequena-nuvem.png" alt="Nuvem Pequena">
                    <img class="nuvem n5" src="./src/img/grande-nuvem.png" alt="Nuvem Grande">
                    <img class="nuvem n7" src="./src/img/pequena-nuvem.png" alt="Nuvem Pequena">
                    <img class="nuvem n8" src="./src/img/grande-nuvem.png" alt="Nuvem Grande">
                    <img class="nuvem n9" src="./src/img/grande-nuvem.png" alt="Nuvem Grande">
                </div>

                <div>
                    <img class="nuvem n8" src="./src/img/pequena-nuvem.png" alt="Nuvem Pequena">
                    <img class="nuvem n9" src="./src/img/pequena-nuvem.png" alt="Nuvem Pequena">
                    <img class="nuvem n6" src="./src/img/grande-nuvem.png" alt="Nuvem Grande">
                    <img class="nuvem n7" src="./src/img/pequena-nuvem.png" alt="Nuvem Pequena">
                    <img class="nuvem n5" src="./src/img/grande-nuvem.png" alt="Nuvem Grande">
                </div>
            </article>

            <article class="telaInicialInimigos">
                <div class="telaInicialkoopas">
                    <img class="koopa" src="./src/img/Koopa.gif" alt="">
                </div>

                <div class="telaInicialGoombas">
                    <img class="goomba" src="./src/img/goomba.gif" alt="goomba 1">
                    <img class="goomba goomba2" src="./src/img/goomba.gif" alt="goomba 2">
                </div>
            </article>
            
            <div class="telaInicialChao">
                <img class="Chao_cenario3" src="./src/img/cenario3.png" alt="chao">
            </div>
            
            <div class="telaInicialMontanhas">
                <img class="conjuntoMontanhas" src="./src/img/conjunto-montanhas.png" alt="">
            </div>
        </main>
        <script src="./src/js/giroDaTela.js"></script>
    </body>
</html>
